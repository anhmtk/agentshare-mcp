name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: integrations/mcp_server/requirements.txt

      - name: Install MCP server deps
        run: pip install -r integrations/mcp_server/requirements.txt

      - name: Compile & import MCP package
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m compileall integrations/mcp_server -q
          python -c "from integrations.mcp_server.price_mcp import create_price_mcp; create_price_mcp()"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agentshare-commerce-mcp/package-lock.json

      - name: Verify Cursor plugin scaffold
        working-directory: agentshare-commerce-mcp
        run: |
          npm ci --omit=dev
          npm run verify
